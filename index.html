<html>
  <html lang="en">
    <head>
      <meta name="viewport" content="width=device-width, initial-scale=1">
      <title>crudSystem</title>
      <link rel="stylesheet" href="css/all.min.css" />
      <link rel="stylesheet" href="css/bootstrap.min.css" />
      <link rel="stylesheet" href="css/style.css" />
    </head>
    <body>
      <h1 class="bg-danger w-100 text-center py-3 text-light crudHead">Crud System</h1>
      <div class="container py-5">
        <div class="mb-3">
          <label for="productName">Product Name</label>
          <input type="text" id="productName" class="form-control mt-2" onkeyup="validName()" />
          <div class="alert alert-danger" id="alertName">
            <p>Enter Valid Name Start With One UpperCase</p>
          </div>
        </div>
        <div class="mb-3">
          <label for="productPrice">Product Price</label>
          <input type="number" id="productPrice" class="form-control mt-2" onkeyup="validPrice()" />
          <div class="alert alert-danger" id="alertPrice">
            <p>Enter Valid Price</p>
          </div>
        </div>
        <div class="mb-3">
          <label for="productCategory">Product Categoray</label>
          <input type="text" id="productCategory" class="form-control mt-2" />
        </div>
        <div class="mb-3">
          <label for="productDescription">Product Description</label>
          <textarea
            id="productDescription"
            class="form-control mt-2"
          ></textarea>
        </div>
        <button class="btn btn-outline-info" onclick="addProduct()" id="addBtn">Add Product</button>
        <button class="btn btn-outline-info" onclick="addEditUpdate()" id="addEdit">Add Edit</button>
        <button onclick="clearData()" class="btn btn-outline-danger">Clear All Form</button>
      </div>

      <div class="container">
        <input type="search" placeholder="Search.." onkeyup="searchData()" id="searchInput" class="form-control w-50 mx-auto mb-5"/>
        <div style="overflow-x:auto;" class="tableResponsive">
          <table class="table table-bordered table-striped">
            <thead>
              <th>#</th>
              <th>productName</th>
              <th>productPrice</th>
              <th>productCategory</th>
              <th>productDescription</th>
              <th>Update</th>
              <th>Delete</th>
            </thead>
            <tbody id="rowData">
             
            </tbody>
          </table>
        </div>
       
      </div>

      <script src="js/main.js"></script>
    </body>
  </html>
</html>
